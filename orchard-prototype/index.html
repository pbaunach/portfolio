    <title>Orchard Prototype</title>
    <script>
      window.addEventListener('load', function () {
        var pathParts = window.location.pathname.split('/').filter(Boolean);
        var projectRoot = '/' + (pathParts[0] || '');
        document.querySelectorAll('img[src^="/assets/"]').forEach(function (img) {
          var rel = img.getAttribute('src').replace(/^\\/+/, '');
          img.src = projectRoot + '/' + rel;
        });
        document.querySelectorAll('source[src^="/assets/"], video[src^="/assets/"]').forEach(function (el) {
          var rel = el.getAttribute('src').replace(/^\\/+/, '');
          el.src = projectRoot + '/' + rel;
        });
      });
    </script>
